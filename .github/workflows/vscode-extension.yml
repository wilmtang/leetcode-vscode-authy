name: VS Code Extension

on:
  pull_request:
    branches: [main]
    paths:
      - src/**
      - resources/**
      - package.json
      - package-lock.json
      - README.md
      - CHANGELOG.md
      - .vscodeignore
      - tsconfig.json
      - tslint.json
      - .github/workflows/vscode-extension.yml
  push:
    branches: [main]
    tags:
      - vscode-extension-v*
    paths:
      - src/**
      - resources/**
      - package.json
      - package-lock.json
      - README.md
      - CHANGELOG.md
      - .vscodeignore
      - tsconfig.json
      - tslint.json
      - .github/workflows/vscode-extension.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish this version to the VS Code Marketplace and Open VSX Registry
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  validate:
    name: Validate VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run build -- --out dist/vscode-leetcode-auth-sync.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-vsix
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    name: Publish VS Code extension
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/vscode-extension-v') || github.event.inputs.publish == 'true'
    permissions:
      contents: write
    environment: vscode-marketplace
    env:
      VSIX_PATH: dist/vscode-leetcode-auth-sync.vsix
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches VS Code extension version
        if: startsWith(github.ref, 'refs/tags/vscode-extension-v')
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#vscode-extension-v}"
          test "$VERSION" = "$TAG" || {
            echo "Tag vscode-extension-v$TAG does not match package.json version $VERSION"
            exit 1
          }

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run build -- --out "$VSIX_PATH"

      - name: Publish VSIX to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npm run publish:vscode:marketplace -- --packagePath "$VSIX_PATH" --skip-duplicate

      - name: Publish VSIX to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npm run publish:vscode:open-vsx -- "$VSIX_PATH" --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/vscode-extension-v')
        env:
          GH_TOKEN: ${{ github.token }}
          OPEN_VSX_URL: https://open-vsx.org/extension/wilmtang/vscode-leetcode-auth-sync
          VSCODE_MARKETPLACE_URL: https://marketplace.visualstudio.com/items?itemName=wilmtang.vscode-leetcode-auth-sync
        run: |
          VERSION="${GITHUB_REF_NAME#vscode-extension-v}"
          RELEASE_VSIX="dist/vscode-leetcode-auth-sync-$VERSION.vsix"
          cp "$VSIX_PATH" "$RELEASE_VSIX"

          cat > release-notes.md <<EOF
          ## Store links
          - [VS Code Marketplace]($VSCODE_MARKETPLACE_URL)
          - [Open VSX Registry]($OPEN_VSX_URL)

          EOF

          gh release create "$GITHUB_REF_NAME" "$RELEASE_VSIX" \
            --title "VS Code Extension v$VERSION" \
            --notes-file release-notes.md \
            --generate-notes \
            --verify-tag || gh release upload "$GITHUB_REF_NAME" "$RELEASE_VSIX" --clobber
